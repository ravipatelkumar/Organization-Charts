<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrgChart Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--s1:#161b27;--s2:#1c2235;--s3:#222840;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.19);
  --acc:#4f8ef7;--acc2:#7c3aed;--gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --t1:#e2e5f0;--t2:#8b90a7;--t3:#4a5068;
  --r:13px;--cw:245px;--f:'DM Sans',sans-serif;--fs:'DM Serif Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:52px;
  background:rgba(13,17,23,0.93);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 16px;gap:8px;flex-wrap:nowrap;overflow-x:auto;
}
.logo{font-family:var(--fs);font-size:17px;color:var(--t1);margin-right:12px;white-space:nowrap;}
.logo em{color:var(--acc);font-style:italic;}
.tb{
  display:flex;align-items:center;gap:5px;padding:6px 11px;
  border-radius:7px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);
  font-family:var(--f);font-size:11.5px;font-weight:500;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;flex-shrink:0;
}
.tb:hover{background:var(--s3);color:var(--t1);border-color:var(--b3);}
.tb.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.tb.on:hover{background:#3a7be8;}
.tb svg{width:13px;height:13px;flex-shrink:0;}
.tb.exp{background:rgba(16,185,129,0.12);color:var(--green);border-color:rgba(16,185,129,0.25);}
.tb.exp:hover{background:rgba(16,185,129,0.22);}

/* CANVAS */
#cw{
  position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;
  background:
    radial-gradient(ellipse at 15% 20%,rgba(79,142,247,0.045) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 80%,rgba(124,58,237,0.04) 0%,transparent 55%),
    var(--bg);
}
#cw::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--b1) 1px,transparent 1px),linear-gradient(90deg,var(--b1) 1px,transparent 1px);
  background-size:44px 44px;
}
#cv{position:absolute;top:0;left:0;transform-origin:0 0;}
#svgl{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* NODE */
.node{
  position:absolute;width:var(--cw);
  background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);
  overflow:hidden;cursor:grab;user-select:none;
  transition:border-color 0.18s,box-shadow 0.18s;
}
.node:active{cursor:grabbing;}
.node.sel{border-color:var(--acc);box-shadow:0 0 0 3px rgba(79,142,247,0.15),0 16px 44px rgba(0,0,0,0.6);}
.node.t-md  .nh{background:linear-gradient(135deg,#14224a,#1a2d66);border-bottom:1px solid rgba(79,142,247,0.28);}
.node.t-mgr .nh{background:linear-gradient(135deg,#0b2820,#0e3828);border-bottom:1px solid rgba(16,185,129,0.22);}
.node.t-dep .nh{background:var(--s2);border-bottom:1px solid var(--b1);}
.nh{padding:11px 12px 9px;position:relative;}
.drag-h{position:absolute;top:8px;right:10px;opacity:0.22;font-size:13px;color:var(--t2);cursor:grab;line-height:1;transition:opacity 0.15s;}
.node:hover .drag-h{opacity:0.5;}
.type-badge{
  display:inline-block;font-size:9px;font-weight:600;letter-spacing:0.07em;
  text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-bottom:5px;
  background:rgba(79,142,247,0.12);color:var(--acc);
}
.node.t-mgr .type-badge{background:rgba(16,185,129,0.12);color:var(--green);}
.node.t-dep .type-badge{background:rgba(255,255,255,0.06);color:var(--t2);}
.ef{background:transparent;border:none;outline:none;color:var(--t1);font-family:var(--f);display:block;width:100%;}
.ef:focus{background:rgba(255,255,255,0.05);border-radius:4px;outline:1px solid rgba(79,142,247,0.35);}
.ef::placeholder{color:var(--t3);}
.f-role{font-size:13.5px;font-weight:600;padding:2px 3px;margin-bottom:1px;}
.f-name{font-size:11px;padding:2px 3px;}

/* BODY */
.nb{padding:10px 12px 8px;}

/* DEPT KRA SECTION */
.dept-kra-sec{margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--b1);}
.sec-lbl{font-size:9px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.kra-list{display:flex;flex-direction:column;gap:3px;}
.ki{display:flex;align-items:flex-start;gap:5px;}
.kdot{width:4px;height:4px;border-radius:50%;background:var(--acc);opacity:0.4;margin-top:6px;flex-shrink:0;}
.kf{font-size:11px;color:var(--t2);flex:1;line-height:1.5;}
.kdel{background:none;border:none;cursor:pointer;color:var(--t3);font-size:13px;line-height:1;padding:0 1px;opacity:0;transition:all 0.12s;flex-shrink:0;}
.ki:hover .kdel{opacity:1;}
.kdel:hover{color:var(--red);}
.add-s{
  font-size:10px;font-weight:500;color:var(--acc);opacity:0.6;
  background:none;border:none;cursor:pointer;padding:3px 0 0;
  transition:opacity 0.15s;
}
.add-s:hover{opacity:1;}

/* EMPLOYEE CARDS */
.emps-sec{}
.emps-list{display:flex;flex-direction:column;gap:6px;margin-bottom:5px;}
.emp-card{
  background:var(--s2);border:1px solid var(--b1);border-radius:9px;overflow:hidden;
}
.emp-hd{
  display:flex;align-items:center;gap:7px;padding:7px 9px 6px;
  cursor:pointer;position:relative;
}
.emp-hd:hover{background:rgba(255,255,255,0.025);}
.av{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  display:flex;align-items:center;justify-content:center;
  font-size:8.5px;font-weight:700;color:#fff;
}
.emp-fields{flex:1;min-width:0;}
.empnf{font-size:11.5px;font-weight:500;}
.empdf{font-size:10px;}
.emp-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.emp-del{
  background:none;border:none;cursor:pointer;
  color:var(--t3);font-size:15px;line-height:1;
  opacity:0;transition:all 0.12s;padding:1px 2px;
}
.emp-card:hover .emp-del{opacity:1;}
.emp-del:hover{color:var(--red);}
.emp-tog{font-size:10px;color:var(--t3);transition:transform 0.2s;line-height:1;}
.emp-tog.open{transform:rotate(180deg);}

/* EMPLOYEE TASK BODY */
.emp-body{padding:0 9px 8px;border-top:1px solid var(--b1);display:none;}
.emp-body.open{display:block;}
.emp-body .sec-lbl{margin-top:7px;margin-bottom:5px;}
.emp-body .kdot{background:var(--green);}
.task-list{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}

/* FOOTER */
.nf{padding:7px 12px;border-top:1px solid var(--b1);display:flex;gap:5px;}
.nfb{
  flex:1;font-size:10px;font-weight:500;padding:5px 4px;border-radius:6px;
  border:1px solid var(--b2);background:transparent;color:var(--t3);
  cursor:pointer;transition:all 0.14s;font-family:var(--f);text-align:center;
}
.nfb:hover{background:var(--s3);color:var(--t2);}
.nfb.cb{color:var(--acc);border-color:rgba(79,142,247,0.22);}
.nfb.cb:hover{background:rgba(79,142,247,0.09);}
.nfb.db{color:var(--red);border-color:rgba(239,68,68,0.18);}
.nfb.db:hover{background:rgba(239,68,68,0.09);}

/* CONNECTIONS */
.cl{stroke:rgba(79,142,247,0.3);stroke-width:1.5;fill:none;marker-end:url(#ah);pointer-events:stroke;cursor:pointer;transition:stroke 0.15s,stroke-width 0.15s;}
.cl:hover{stroke:rgba(79,142,247,0.75);stroke-width:2.5;}
.cl.sc{stroke:var(--acc);stroke-width:2.5;}

/* CONNECT MODE */
body.cm #cv{cursor:crosshair;}
body.cm .node{cursor:pointer;}
.ca{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(245,158,11,0.2)!important;}
.hbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 18px;font-size:12px;color:var(--gold);z-index:300;pointer-events:none;display:none;}

/* ADD PANEL */
.ap{position:fixed;top:60px;right:14px;z-index:150;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:16px;width:210px;display:none;}
.ap.open{display:block;}
.ap-ttl{font-size:10.5px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--t2);margin-bottom:12px;}
.ap label{display:block;font-size:10.5px;color:var(--t3);margin-bottom:3px;}
.ap input,.ap select{width:100%;padding:7px 9px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;color:var(--t1);font-family:var(--f);font-size:12px;outline:none;margin-bottom:9px;}
.ap input:focus,.ap select:focus{border-color:var(--acc);}
.ap select option{background:var(--s2);}

/* ZOOM */
.zrow{position:fixed;bottom:18px;left:18px;z-index:150;display:flex;gap:5px;align-items:center;}
.zb{width:32px;height:32px;border-radius:7px;background:var(--s2);border:1px solid var(--b2);color:var(--t2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.14s;}
.zb:hover{background:var(--s3);color:var(--t1);}
#zlbl{font-size:11px;color:var(--t3);min-width:38px;text-align:center;}

/* TOAST */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 16px;font-size:12px;color:var(--t1);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.25s;white-space:nowrap;}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Org<em>Chart</em> Builder</div>

  <button class="tb" onclick="toggleAP()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
    Add Node
  </button>

  <button class="tb" id="btn-cm" onclick="toggleCM()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="3" cy="8" r="1.8"/><circle cx="13" cy="3" r="1.8"/><circle cx="13" cy="13" r="1.8"/><line x1="4.8" y1="7.5" x2="11.2" y2="4"/><line x1="4.8" y1="8.5" x2="11.2" y2="12"/></svg>
    Connect Nodes
  </button>

  <button class="tb" onclick="delSelConn()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
    Delete Arrow
  </button>

  <button class="tb" onclick="autoLayout()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5.5" y="1" width="5" height="4" rx="1"/><rect x="1" y="11" width="5" height="4" rx="1"/><rect x="10" y="11" width="5" height="4" rx="1"/><line x1="8" y1="5" x2="8" y2="8"/><line x1="3.5" y1="8" x2="12.5" y2="8"/><line x1="3.5" y1="8" x2="3.5" y2="11"/><line x1="12.5" y1="8" x2="12.5" y2="11"/></svg>
    Auto Layout
  </button>

  <button class="tb" onclick="fitView()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 5V2h3M12 2h3v3M1 11v3h3M12 14h3v-3"/></svg>
    Fit View
  </button>

  <button class="tb exp" onclick="exportSVG()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12h10M8 2v8M5 7l3 3 3-3"/></svg>
    Export SVG
  </button>
</div>

<!-- ADD PANEL -->
<div class="ap" id="ap">
  <div class="ap-ttl">Add New Node</div>
  <label>Role / Post Name</label>
  <input id="nr" placeholder="e.g. HR Manager">
  <label>Head / In-charge Name</label>
  <input id="nn" placeholder="e.g. Ramesh Kumar">
  <label>Node Type</label>
  <select id="nt">
    <option value="t-dep">Department</option>
    <option value="t-mgr">Manager</option>
    <option value="t-md">Director / MD</option>
  </select>
  <button class="tb on" style="width:100%;justify-content:center" onclick="addNodeFromPanel()">+ Add Node</button>
</div>

<!-- CANVAS -->
<div id="cw">
  <div id="cv">
    <svg id="svgl" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="rgba(79,142,247,0.55)"/>
        </marker>
        <marker id="ahs" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="#4f8ef7"/>
        </marker>
      </defs>
    </svg>
  </div>
</div>

<!-- ZOOM -->
<div class="zrow">
  <button class="zb" onclick="doZoom(-0.12)">−</button>
  <span id="zlbl">100%</span>
  <button class="zb" onclick="doZoom(0.12)">+</button>
  <button class="zb" onclick="resetView()" title="Reset">⌂</button>
</div>

<div class="hbar" id="hbar">Click source node → then target node &nbsp;|&nbsp; <strong>ESC</strong> to cancel</div>
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let nodes=[], conns=[], nid=0;
let scale=1, px=60, py=60;
let panning=false, pst={};
let dragging=false, dnode=null, dox=0, doy=0;
let cmMode=false, cmSrc=null;
let selConn=null;

const cv=document.getElementById('cv');
const svgl=document.getElementById('svgl');
const cw=document.getElementById('cw');

// ── UTILS ──
function uid(){return 'nd'+(++nid);}
function $id(id){return document.getElementById(id);}
function toast(m){const t=$id('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function applyT(){cv.style.transform=`translate(${px}px,${py}px) scale(${scale})`;$id('zlbl').textContent=Math.round(scale*100)+'%';}

function getCenter(id){
  const n=nodes.find(x=>x.id===id);if(!n)return null;
  const el=$id(id);if(!el)return null;
  return{x:n.x+el.offsetWidth/2,y:n.y+el.offsetHeight/2,w:el.offsetWidth,h:el.offsetHeight};
}

// ── DRAW CONNECTIONS ──
function drawConns(){
  svgl.querySelectorAll('path.cl').forEach(e=>e.remove());
  conns.forEach((c,i)=>{
    const a=getCenter(c.from),b=getCenter(c.to);if(!a||!b)return;
    const x1=a.x,y1=a.y+a.h/2,x2=b.x,y2=b.y;
    const my=(y1+y2)/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
    p.setAttribute('class','cl'+(selConn===i?' sc':''));
    p.setAttribute('marker-end',selConn===i?'url(#ahs)':'url(#ah)');
    p.addEventListener('click',e=>{e.stopPropagation();selConn=(selConn===i?null:i);drawConns();});
    svgl.appendChild(p);
  });
}

// ── CONNECT MODE ──
function toggleCM(){
  cmMode=!cmMode;
  document.body.classList.toggle('cm',cmMode);
  $id('btn-cm').classList.toggle('on',cmMode);
  $id('hbar').style.display=cmMode?'block':'none';
  if(!cmMode){cmSrc=null;document.querySelectorAll('.node').forEach(n=>n.classList.remove('ca'));}
}
function startConn(nodeId){if(!cmMode)toggleCM();handleCM(nodeId);}
function handleCM(nodeId){
  if(!cmSrc){
    cmSrc=nodeId;$id(nodeId).classList.add('ca');
  } else {
    if(cmSrc!==nodeId){
      if(!conns.find(c=>c.from===cmSrc&&c.to===nodeId)){
        conns.push({from:cmSrc,to:nodeId});drawConns();toast('Arrow added!');
      } else toast('Already connected');
    }
    document.querySelectorAll('.node').forEach(n=>n.classList.remove('ca'));
    cmSrc=null;toggleCM();
  }
}
function delSelConn(){
  if(selConn===null){toast('Click on an arrow to select it first');return;}
  conns.splice(selConn,1);selConn=null;drawConns();toast('Arrow deleted');
}

// ── KRA HELPERS ──
function deptKraHTML(text){
  return `<div class="ki"><span class="kdot"></span><input class="ef kf" value="${text}" placeholder="Add department KRA..."><button class="kdel" onclick="this.closest('.ki').remove()">×</button></div>`;
}
function taskHTML(text){
  return `<div class="ki"><span class="kdot" style="background:var(--green)"></span><input class="ef kf" value="${text}" placeholder="Add task / work..."><button class="kdel" onclick="this.closest('.ki').remove()">×</button></div>`;
}

// ── EMPLOYEE CARD HTML ──
function empCardHTML(nodeId,empId){
  return `
<div class="emp-card" id="${empId}">
  <div class="emp-hd" onclick="toggleEmpBody('${empId}')">
    <div class="av" id="av-${empId}">?</div>
    <div class="emp-fields">
      <input class="ef empnf" placeholder="Employee name..." oninput="syncAv('${empId}',this)">
      <input class="ef empdf" placeholder="Designation..." style="color:var(--t3);margin-top:2px">
    </div>
    <div class="emp-actions">
      <button class="emp-del" onclick="event.stopPropagation();deleteEmp('${empId}')" title="Remove employee">×</button>
      <span class="emp-tog" id="tog-${empId}">▾</span>
    </div>
  </div>
  <div class="emp-body" id="body-${empId}">
    <div class="sec-lbl" style="margin-top:8px">Tasks / Kaam</div>
    <div class="task-list" id="tl-${empId}"></div>
    <button class="add-s" onclick="addTask('${empId}')">+ add task</button>
  </div>
</div>`;
}

function syncAv(empId,input){
  const av=$id('av-'+empId);
  const v=input.value.trim();
  av.textContent=v?v.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2):'?';
}
function toggleEmpBody(empId){
  const body=$id('body-'+empId);
  const tog=$id('tog-'+empId);
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  tog.classList.toggle('open',!open);
}
function deleteEmp(empId){
  const el=$id(empId);if(el)el.remove();
}
function addTask(empId){
  const tl=$id('tl-'+empId);
  const div=document.createElement('div');
  div.innerHTML=taskHTML('');
  tl.appendChild(div.firstElementChild);
  tl.lastElementChild.querySelector('input').focus();
}

// ── ADD EMPLOYEE TO NODE ──
function addEmpToNode(btn,nodeId){
  const list=btn.previousElementSibling;
  const empId='emp-'+Date.now();
  const div=document.createElement('div');
  div.innerHTML=empCardHTML(nodeId,empId);
  list.appendChild(div.firstElementChild);
  // focus name field
  const nf=$id(empId).querySelector('.empnf');
  if(nf) nf.focus();
}

// ── ADD DEPT KRA ──
function addDeptKra(btn){
  const list=btn.previousElementSibling;
  const div=document.createElement('div');
  div.innerHTML=deptKraHTML('');
  list.appendChild(div.firstElementChild);
  list.lastElementChild.querySelector('input').focus();
}

// ── BUILD NODE HTML ──
function buildNodeHTML(data){
  const badge=data.type==='t-md'?'Director':data.type==='t-mgr'?'Manager':'Department';
  return `
<div class="nh">
  <span class="drag-h">⠿</span>
  <div class="type-badge">${badge}</div>
  <input class="ef f-role" value="${data.role||''}" placeholder="Role / Post name...">
  <input class="ef f-name" value="${data.name||''}" placeholder="Head / In-charge name..." style="color:var(--t2)">
</div>
<div class="nb">
  <div class="dept-kra-sec">
    <div class="sec-lbl">Department KRA</div>
    <div class="kra-list dept-kl"></div>
    <button class="add-s" onclick="addDeptKra(this)">+ add KRA</button>
  </div>
  <div class="emps-sec">
    <div class="sec-lbl">Employees</div>
    <div class="emps-list"></div>
    <button class="add-s" onclick="addEmpToNode(this,'${data.id}')">+ add employee</button>
  </div>
</div>
<div class="nf">
  <button class="nfb cb" onclick="startConn('${data.id}')">⟶ Connect</button>
  <button class="nfb db" onclick="removeNode('${data.id}')">✕ Delete</button>
</div>`;
}

// ── CREATE NODE ──
function createNode(data){
  const el=document.createElement('div');
  el.className='node '+data.type;
  el.id=data.id;
  el.style.cssText=`left:${data.x}px;top:${data.y}px;`;
  el.innerHTML=buildNodeHTML(data);

  // Drag
  el.addEventListener('mousedown',e=>{
    if(cmMode){handleCM(data.id);return;}
    const tag=e.target.tagName.toLowerCase();
    if(tag==='input'||tag==='button'||e.target.classList.contains('add-s')||e.target.classList.contains('kdel')||e.target.classList.contains('emp-del')||e.target.classList.contains('emp-tog')||e.target.closest('.emp-hd button')) return;
    e.preventDefault();
    dragging=true;dnode=el;
    const r=el.getBoundingClientRect();
    dox=e.clientX-r.left;doy=e.clientY-r.top;
    el.style.zIndex=99;
    document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
    el.classList.add('sel');
  });

  nodes.push(data);
  cv.appendChild(el);
  return el;
}

function removeNode(id){
  const el=$id(id);if(el)el.remove();
  nodes=nodes.filter(n=>n.id!==id);
  conns=conns.filter(c=>c.from!==id&&c.to!==id);
  drawConns();toast('Node deleted');
}

// ── ADD NODE FROM PANEL ──
function toggleAP(){$id('ap').classList.toggle('open');}
function addNodeFromPanel(){
  const role=$id('nr').value.trim();
  const name=$id('nn').value.trim();
  const type=$id('nt').value;
  const id=uid();
  const x=(cw.clientWidth/2-px)/scale-122;
  const y=(cw.clientHeight/2-py)/scale-80;
  createNode({id,type,role,name,x,y});
  drawConns();
  $id('ap').classList.remove('open');
  $id('nr').value='';$id('nn').value='';
  toast('Node added!');
}

// ── PAN & DRAG ──
document.addEventListener('mousemove',e=>{
  if(dragging&&dnode){
    const r=cw.getBoundingClientRect();
    const nx=(e.clientX-r.left-px)/scale-dox/scale;
    const ny=(e.clientY-r.top-py)/scale-doy/scale;
    dnode.style.left=nx+'px';dnode.style.top=ny+'px';
    const n=nodes.find(x=>x.id===dnode.id);
    if(n){n.x=nx;n.y=ny;}
    drawConns();
  }
  if(panning){px+=e.clientX-pst.x;py+=e.clientY-pst.y;pst={x:e.clientX,y:e.clientY};applyT();}
});
document.addEventListener('mouseup',()=>{
  if(dnode){dnode.style.zIndex='';dragging=false;dnode=null;}
  panning=false;
});
cw.addEventListener('mousedown',e=>{
  if(e.target===cw||e.target===cv||e.target===svgl){
    panning=true;pst={x:e.clientX,y:e.clientY};
    selConn=null;drawConns();
    document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
  }
});
cw.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?-0.09:0.09;
  const r=cw.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const prev=scale;
  scale=Math.max(0.12,Math.min(3,scale+d));
  px=mx-(mx-px)*(scale/prev);
  py=my-(my-py)*(scale/prev);
  applyT();
},{passive:false});

function doZoom(d){scale=Math.max(0.12,Math.min(3,scale+d));applyT();}
function resetView(){scale=1;px=60;py=60;applyT();}
function fitView(){
  if(!nodes.length)return;
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const els=nodes.map(n=>$id(n.id)).filter(Boolean);
  if(!els.length)return;
  const mxW=Math.max(...els.map(e=>e.offsetWidth));
  const mxH=Math.max(...els.map(e=>e.offsetHeight));
  const pad=60;
  const minX=Math.min(...xs)-pad,minY=Math.min(...ys)-pad;
  const tW=Math.max(...xs)+mxW+pad-minX;
  const tH=Math.max(...ys)+mxH+pad-minY;
  const W=cw.clientWidth,H=cw.clientHeight;
  scale=Math.min(W/tW,H/tH,1.1)*0.87;
  px=(W-tW*scale)/2-minX*scale;
  py=(H-tH*scale)/2-minY*scale;
  applyT();
}

// ── AUTO LAYOUT ──
function autoLayout(){
  if(!nodes.length)return;
  const targets=new Set(conns.map(c=>c.to));
  const roots=nodes.filter(n=>!targets.has(n.id));
  if(!roots.length){toast('No root node found');return;}
  const GAP_X=28,GAP_Y=130,W=265,H=320;
  const lvs={};
  function asgn(id,lv){
    lvs[id]=Math.max(lvs[id]||0,lv);
    conns.filter(c=>c.from===id).forEach(c=>asgn(c.to,lv+1));
  }
  roots.forEach(r=>asgn(r.id,0));
  const byLv={};
  nodes.forEach(n=>{const lv=lvs[n.id]||0;(byLv[lv]=byLv[lv]||[]).push(n);});
  Object.entries(byLv).forEach(([lv,grp])=>{
    const tw=grp.length*(W+GAP_X)-GAP_X;
    grp.forEach((nd,i)=>{
      nd.x=i*(W+GAP_X)-tw/2+900;
      nd.y=+lv*(H+GAP_Y)+60;
      const el=$id(nd.id);
      if(el){el.style.left=nd.x+'px';el.style.top=nd.y+'px';}
    });
  });
  drawConns();setTimeout(fitView,60);toast('Layout applied!');
}

// ── EXPORT SVG ──
function exportSVG(){
  if(!nodes.length){toast('No nodes to export');return;}
  const pad=60;
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const els=nodes.map(n=>$id(n.id)).filter(Boolean);
  if(!els.length)return;
  const mxW=Math.max(...els.map(e=>e.offsetWidth));
  const mxH=Math.max(...els.map(e=>e.offsetHeight));
  const minX=Math.min(...xs)-pad,minY=Math.min(...ys)-pad;
  const tW=Math.max(...xs)+mxW+pad-minX;
  const tH=Math.max(...ys)+mxH+pad-minY;
  const ns='http://www.w3.org/2000/svg';
  const s=document.createElementNS(ns,'svg');
  s.setAttribute('width',tW);s.setAttribute('height',tH);
  s.setAttribute('xmlns',ns);s.setAttribute('xmlns:xhtml','http://www.w3.org/1999/xhtml');
  const bg=document.createElementNS(ns,'rect');
  bg.setAttribute('width',tW);bg.setAttribute('height',tH);bg.setAttribute('fill','#0d1117');
  s.appendChild(bg);
  conns.forEach(c=>{
    const a=getCenter(c.from),b=getCenter(c.to);if(!a||!b)return;
    const x1=a.x-minX,y1=a.y+a.h/2-minY,x2=b.x-minX,y2=b.y-minY;
    const my=(y1+y2)/2;
    const p=document.createElementNS(ns,'path');
    p.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
    p.setAttribute('fill','none');p.setAttribute('stroke','rgba(79,142,247,0.5)');p.setAttribute('stroke-width','2');
    s.appendChild(p);
  });
  nodes.forEach(nd=>{
    const el=$id(nd.id);if(!el)return;
    const fo=document.createElementNS(ns,'foreignObject');
    fo.setAttribute('x',nd.x-minX);fo.setAttribute('y',nd.y-minY);
    fo.setAttribute('width',el.offsetWidth);fo.setAttribute('height',el.offsetHeight);
    const cl=el.cloneNode(true);
    cl.style.position='static';cl.style.left='0';cl.style.top='0';
    fo.appendChild(cl);s.appendChild(fo);
  });
  const str=new XMLSerializer().serializeToString(s);
  const blob=new Blob([str],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='orgchart.svg';a.click();
  URL.revokeObjectURL(url);
  toast('Exported!');
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&cmMode)toggleCM();
  if((e.key==='Delete'||e.key==='Backspace')&&selConn!==null&&!e.target.matches('input'))delSelConn();
});

// ── INIT ──
(function init(){
  // Start with ONE blank MD node — user fills everything themselves
  const id=uid();
  createNode({id,type:'t-md',role:'',name:'',x:400,y:80});
  drawConns();
  setTimeout(()=>{px=200;py=80;scale=1;applyT();},50);
})();
</script>
